name: Analyze Bundle Size and Lighthouse

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  analyze-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # importante para comparar entre branches

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build with sourcemaps
        run: pnpm run build

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: dist/bundle-report.html

      - name: Comment PR with bundle size
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
              ### 📦 Bundle Report generated
              const report = JSON.parse(fs.readFileSync('bundle-report.json', 'utf8'));
              // Filtra os arquivos que têm '/src/' no caminho
              const srcFiles = Object.keys(report).filter(file => file.includes('/src/'));

              // Inicializa variáveis para armazenar os tamanhos totais
              let totalRendered = 0;
              let totalGzip = 0;

              // Soma os valores de 'rendered' e 'gzip' dos arquivos filtrados
              srcFiles.forEach(file => {
                totalRendered += report[file].rendered;
                totalGzip += report[file].gzip;
              });

              // Converte para KB
              const renderedKB = (totalRendered / 1024).toFixed(2);
              const gzipKB = (totalGzip / 1024).toFixed(2);

              - **Rendered size**: \`${rendered}\`
              - **Gzip size**: \`${gzipKB} KB\`

              _Gerado automaticamente por GitHub Actions._
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  lhci:
    name: Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies and build
        run: |
          pnpm install
          pnpm run build

      - name: run Lighthouse CI
        run: |
          pnpm install -g @lhci/cli@0.14.x
          lhci autorun
